<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>AccessIA — Configurações</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 600px; margin: 30px auto; padding: 0 20px; font-size: 15px; }
    h1 { font-size: 22px; border-bottom: 2px solid #2196F3; padding-bottom: 8px; }
    h2 { font-size: 16px; margin-top: 24px; color: #333; }
    .campo { margin: 12px 0; }
    label { display: block; font-weight: bold; margin-bottom: 4px; }
    input[type="text"], input[type="number"] { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; box-sizing: border-box; }
    .toggle { display: flex; align-items: center; gap: 10px; margin: 10px 0; }
    .toggle input[type="checkbox"] { width: 18px; height: 18px; cursor: pointer; }
    .toggle label { font-weight: normal; cursor: pointer; margin: 0; }
    .descricao { font-size: 12px; color: #666; margin-top: 2px; }
    .btn-salvar { background: #2196F3; color: white; border: none; padding: 10px 24px; font-size: 15px; border-radius: 4px; cursor: pointer; margin-top: 20px; }
    .btn-salvar:hover { background: #1976D2; }
    .msg { margin-top: 10px; padding: 8px; border-radius: 4px; display: none; }
    .msg.ok { background: #e8f5e9; color: #2e7d32; display: block; }
  </style>
</head>
<body>
  <h1>AccessIA — Configurações</h1>
  <h2>Servidor de análise</h2>
  <div class="campo">
    <label for="servidor_url">Endereço do servidor AccessIA:</label>
    <input type="text" id="servidor_url" placeholder="http://192.168.0.130:8450">
    <div class="descricao">IP e porta onde o servidor está rodando na sua rede local.</div>
  </div>
  <h2>Varredura automática</h2>
  <div class="toggle">
    <input type="checkbox" id="varredura_passiva">
    <label for="varredura_passiva">Analisar cada site visitado automaticamente (modo passivo)</label>
  </div>
  <div class="toggle" style="margin-top:12px">
    <input type="checkbox" id="varredura_favoritos">
    <label for="varredura_favoritos">Escanear favoritos automaticamente uma vez por dia</label>
  </div>
  <div class="toggle" style="margin-top:12px">
    <input type="checkbox" id="ignorar_login">
    <label for="ignorar_login">Ignorar páginas de login e senha</label>
  </div>
  <div class="toggle" style="margin-top:12px">
    <input type="checkbox" id="notificacao_conclusao">
    <label for="notificacao_conclusao">Mostrar notificação quando análise terminar</label>
  </div>
  <h2>Intervalo entre análises</h2>
  <div class="campo">
    <label for="cooldown_segundos">Tempo mínimo entre análises do mesmo site (segundos):</label>
    <input type="number" id="cooldown_segundos" min="60" max="86400" step="60">
    <div class="descricao">Padrão: 300 segundos (5 minutos).</div>
  </div>
  <div class="campo">
    <label for="max_fila">Máximo de itens na fila:</label>
    <input type="number" id="max_fila" min="10" max="1000" step="10">
    <div class="descricao">Padrão: 200 itens.</div>
  </div>
  <button class="btn-salvar" id="btn_salvar">Salvar configurações</button>
  <div class="msg" id="msg_salvo">Configurações salvas com sucesso.</div>
  <script src="options.js"></script>
</body>
</html>
